<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Corporativo - Claro Chile</title>
    
    <script src="webex.min.js"></script>
    
    <style>
        :root {
            --claro-red: #ef3829;
            --claro-dark: #212529;
            --claro-gray: #f4f7f9;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--claro-gray);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            text-align: center;
        }

        .logo-claro {
            width: 140px;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--claro-dark);
            font-size: 22px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        p {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background-color: var(--claro-red);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
        }

        .btn-login:hover {
            background-color: #d63022;
            box-shadow: 0 5px 15px rgba(239, 56, 41, 0.3);
        }

        .status-msg {
            margin-top: 20px;
            font-size: 13px;
            color: #28a745;
            display: none; /* Se activa al loguear */
        }

        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: #adb5bd;
            letter-spacing: 0.5px;
        }

        /* Estilo para el indicador de carga */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--claro-red);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 10px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/ee/Logo_Claro.svg" class="logo-claro" alt="Claro Chile">
        
        <h1>Portal de Soporte</h1>
        <p>Para habilitar las funciones de llamada, por favor inicia sesión con tu cuenta de Webex.</p>

        <a id="loginLink" href="#" class="btn-login" onclick="showLoader()">
            Iniciar Sesión con Webex
        </a>

        <div id="loader" class="loader"></div>
        <div id="successMsg" class="status-msg">✅ Autenticación exitosa. Redirigiendo...</div>

        <div class="footer">
            SISTEMA DE ASISTENCIA CLARO CHILE
        </div>
    </div>

    <script src="js/app.js"></script>

    <script>
        // CONFIGURACIÓN: Aquí pon tu URL de autorización (la que termina en response_type=token)
        const CLIENT_ID = 'C6b8299f6b12f82cec3482504e820982d6f501b66a0290d70868b782f942368c2';
        const REDIRECT_URI = 'https://vladlerena.github.io/Vlad-calling-sdk/';
        
        const authUrl = `https://webexapis.com/v1/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=spark%3Akms%20spark%3Apeople_read%20spark%3Awebrtc_calling%20spark%3Acalls_read%20spark%3Acalls_write&state=set_state_here`;
        
        document.getElementById('loginLink').href = authUrl;

        function showLoader() {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('loginLink').innerText = 'Conectando...';
        }

        // Lógica para detectar si ya volvimos del Login con el Token
        window.onload = () => {
            if (window.location.hash.includes('access_token')) {
                document.getElementById('successMsg').style.display = 'block';
                document.getElementById('loginLink').style.display = 'none';
                
                // Redirigimos automáticamente a tu nueva página de Customer Assist
                setTimeout(() => {
                    window.location.href = 'mytrips.html';
                }, 2000);
            }
        };
    </script>
</body>
</html>
