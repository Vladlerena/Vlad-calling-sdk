<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>C2C Directo - 6100</title>
    <script src="webex.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f9; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        #status { margin: 20px 0; font-size: 14px; color: #555; min-height: 40px; line-height: 1.4; }
        .btn-call { width: 100%; padding: 15px; background: #007aa5; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-call:disabled { background: #ccc; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h2>Llamar al 6100</h2>
    <div id="status">Ingresa el Token para empezar</div>
    
    <input type="password" id="tokenInput" placeholder="Access Token de Service App">
    
    <button id="btnCall" onclick="iniciar()" class="btn-call">LLAMAR AHORA</button>
</div>

<script>
    let webex;
    let activeCall;

    async function iniciar() {
        const token = document.getElementById('tokenInput').value.trim();
        const status = document.getElementById('status');
        const btn = document.getElementById('btnCall');

        if (activeCall) {
            status.innerText = "Terminando llamada...";
            await activeCall.hangup();
            return;
        }

        try {
            btn.disabled = true;
            status.innerText = "Conectando con Webex...";

            // 1. Inicialización idéntica a la lógica interna del Calling SDK de Cisco
            webex = Webex.init({
                credentials: { access_token: token }
            });

            // Forzamos la configuración que el fork hace en el fondo
            webex.config.phone.enablePhoneService = true;
            webex.config.phone.enableWebRTC = true;

            // 2. Registro del dispositivo (WDM)
            status.innerText = "Registrando dispositivo...";
            await webex.internal.device.register();

            // 3. Registro de voz (Aquí es donde el fork suele tardar un poco)
            status.innerText = "Sincronizando línea de voz...";
            await webex.phone.register();

            // 4. Marcación directa
            status.innerText = "Marcando al 6100...";
            
            // Usamos la estructura de la demo: .dial devuelve una promesa con la llamada
            webex.phone.dial('6100').then((call) => {
                activeCall = call;

                activeCall.on('connected', () => {
                    status.innerText = "🟢 EN LLAMADA CON 6100";
                    btn.innerText = "COLGAR";
                    btn.style.background = "#d93025";
                    btn.disabled = false;
                });

                activeCall.on('disconnected', () => {
                    status.innerText = "Llamada finalizada";
                    resetUI();
                });

                activeCall.on('error', (err) => {
                    status.innerText = "Error: " + err.message;
                    resetUI();
                });
            }).catch((err) => {
                status.innerText = "Fallo al marcar: " + err.message;
                btn.disabled = false;
            });

        } catch (error) {
            console.error(error);
            status.innerText = "Fallo: " + error.message;
            btn.disabled = false;
        }
    }

    function resetUI() {
        const btn = document.getElementById('btnCall');
        activeCall = null;
        btn.innerText = "LLAMAR AHORA";
        btn.style.background = "#007aa5";
        btn.disabled = false;
    }
</script>

</body>
</html>
