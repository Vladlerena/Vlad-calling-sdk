<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>C2C Directo - 6100</title>
    <script src="webex.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f9; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        #status { margin: 20px 0; font-size: 14px; color: #555; min-height: 40px; line-height: 1.4; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .btn-call { width: 100%; padding: 15px; background: #007aa5; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h2>Anexo 6100</h2>
    <div id="status">Pega el Token para iniciar</div>
    <input type="password" id="tokenInput" placeholder="Access Token">
    <button id="btnCall" onclick="iniciar()" class="btn-call">LLAMAR AL 6100</button>
</div>

<script>
    let webex;
    let activeCall;

    async function iniciar() {
        const token = document.getElementById('tokenInput').value.trim();
        const status = document.getElementById('status');
        const btn = document.getElementById('btnCall');

        if (activeCall) {
            activeCall.hangup();
            return;
        }

        try {
            btn.disabled = true;
            status.innerText = "1/4: Inicializando...";

            // FORMA CORRECTA DE INICIALIZAR (Evita el error de undefined)
            webex = Webex.init({
                credentials: { access_token: token },
                config: {
                    phone: {
                        enablePhoneService: true,
                        enableWebRTC: true,
                        calling: { enabled: true }
                    }
                }
            });

            // TRUCO PARA EL MICRÓFONO:
            // Pedimos permiso manualmente antes de que el SDK falle por falta de hardware
            status.innerText = "2/4: Solicitando Micrófono...";
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
                console.log("Micrófono autorizado por el usuario");
            } catch (micErr) {
                throw new Error("No se puede llamar sin permiso de micrófono.");
            }

            status.innerText = "3/4: Registrando en Cisco (WDM)...";
            await webex.internal.device.register();
            
            status.innerText = "4/4: Sincronizando línea...";
            await webex.phone.register();

            status.innerText = "Marcando al 6100...";
            activeCall = await webex.phone.dial('6100');

            activeCall.on('connected', () => {
                status.innerText = "🟢 EN LLAMADA";
                btn.innerText = "COLGAR";
                btn.style.background = "#d93025";
                btn.disabled = false;
            });

            activeCall.on('disconnected', () => {
                status.innerText = "Llamada finalizada";
                resetUI();
            });

        } catch (error) {
            console.error("Error completo:", error);
            status.innerText = "❌ Fallo: " + error.message;
            btn.disabled = false;
        }
    }

    function resetUI() {
        const btn = document.getElementById('btnCall');
        activeCall = null;
        btn.innerText = "LLAMAR AL 6100";
        btn.style.background = "#007aa5";
        btn.disabled = false;
    }
</script>
</body>
</html>
