<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claro Chile - Customer Assist</title>
    
    <script src="webex.min.js"></script>
    
    <style>
        :root {
            --claro-red: #ef3829;
            --claro-dark: #212529;
            --claro-gray: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--claro-gray);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }

        .logo-claro {
            width: 120px;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--claro-dark);
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        p {
            color: #6c757d;
            font-size: 15px;
            margin-bottom: 30px;
        }

        /* Indicador de Estado (Burbuja) */
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px;
            border-radius: 20px;
            background: #eee;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 30px;
            transition: 0.3s;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #adb5bd;
            margin-right: 8px;
        }

        /* Estados de la burbuja */
        .online .status-dot { background: #28a745; box-shadow: 0 0 8px #28a745; }
        .online { color: #155724; background: #d4edda; }

        /* Botón de Llamada Moderno */
        .btn-call {
            width: 100%;
            padding: 18px;
            background-color: var(--claro-red);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-call:hover:not(:disabled) {
            background-color: #d63022;
            box-shadow: 0 8px 20px rgba(239, 56, 41, 0.3);
            transform: translateY(-2px);
        }

        .btn-call:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-call:disabled {
            background-color: #e9ecef;
            color: #adb5bd;
            cursor: not-allowed;
        }

        .btn-hangup {
            background-color: var(--claro-dark) !important;
        }

        /* Footer */
        .footer-text {
            margin-top: 25px;
            font-size: 11px;
            color: #adb5bd;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/ee/Logo_Claro.svg" class="logo-claro" alt="Claro Chile">
        
        <h1>Customer Assist</h1>
        <p>Conectando con soporte técnico...</p>

        <div id="status-container" class="status-badge">
            <span class="status-dot"></span>
            <span id="status-text">Sincronizando SDK...</span>
        </div>

        <button id="btnCall" onclick="iniciarLlamada()" class="btn-call" disabled>
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                <path d="M3.654 1.328a.678.678 0 0 0-1.015-.063L1.605 2.3c-.483.484-.661 1.169-.45 1.77a17.568 17.568 0 0 0 4.168 6.608 17.569 17.569 0 0 0 6.608 4.168c.601.211 1.286.033 1.77-.45l1.034-1.034a.678.678 0 0 0-.063-1.015l-2.307-1.794a.678.678 0 0 0-.58-.122l-2.19.547a1.745 1.745 0 0 1-1.657-.459L5.482 8.062a1.745 1.745 0 0 1-.46-1.657l.548-2.19a.678.678 0 0 0-.122-.58L3.654 1.328z"/>
            </svg>
            Llamar al 6100
        </button>

        <div class="footer-text">vladlerena.github.io</div>
    </div>

    <script src="js/app.js"></script>
    <script src="sdk/calling-sdk.js"></script>

    <script>
        // Mapeamos las funciones del Fork a nuestra nueva interfaz
        async function iniciarLlamada() {
            const btn = document.getElementById('btnCall');
            const statusText = document.getElementById('status-text');

            try {
                if (btn.classList.contains('btn-hangup')) {
                    statusText.innerText = "Terminando llamada...";
                    await callingSDK.hangup();
                } else {
                    statusText.innerText = "Llamando al 6100...";
                    await callingSDK.makeCall('6100');
                    
                    btn.innerHTML = "Colgar Llamada";
                    btn.classList.add('btn-hangup');
                }
            } catch (error) {
                console.error(error);
                statusText.innerText = "Error: " + error.message;
            }
        }

        // Sistema de monitoreo para la burbuja verde
        const monitorInterval = setInterval(() => {
            if (typeof callingSDK !== 'undefined' && callingSDK.isRegistered) {
                const badge = document.getElementById('status-container');
                const text = document.getElementById('status-text');
                const btn = document.getElementById('btnCall');

                badge.classList.add('online');
                text.innerText = "Agente Online";
                btn.disabled = false;
                
                clearInterval(monitorInterval);
            }
        }, 1000);
    </script>
</body>
</html>
