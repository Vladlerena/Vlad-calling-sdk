<!DOCTYPE html>
<html lang="es">
<head>
<title>Claro Chile - Customer Assist</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<script type="application/x-javascript"> 
    addEventListener("load", function() { setTimeout(hideURLbar, 0); }, false); 
    function hideURLbar(){ window.scrollTo(0,1); } 
</script>

<link href="css/bootstrap.css" rel="stylesheet" type="text/css" media="all" />
<link rel="stylesheet" href="css/style.css" type="text/css" media="all" />
<link href="css/font-awesome.css" rel="stylesheet"> 
<link href='//fonts.googleapis.com/css?family=Oswald:400,700,300' rel='stylesheet' type='text/css'>
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">

<style>
	/* Estilo Dark Corporativo Claro */
	body { background: #121212; color: #fff; font-family: 'Oswald', sans-serif; margin:0; }
	.banner { background: #1e1e1e; border-bottom: 3px solid #ef3829; padding: 1em 0; }
	
	.support-container {
		max-width: 600px;
		margin: 50px auto;
		background: #1e1e1e;
		padding: 40px;
		border-radius: 20px;
		box-shadow: 0 15px 40px rgba(0,0,0,0.6);
		text-align: center;
		border: 1px solid #333;
	}

	.status-panel {
		background: #252525;
		padding: 15px;
		border-radius: 10px;
		margin-bottom: 30px;
		display: flex;
		align-items: center;
		justify-content: center;
		gap: 15px;
	}

	#registration-status-icon {
		width: 12px; height: 12px; border-radius: 50%; background: #444;
	}
	.online-status { background: #28a745 !important; box-shadow: 0 0 10px #28a745; }

	h2 { color: #fff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
	p.subtitle { color: #888; margin-bottom: 30px; }

	.call-action-btn {
		background: #ef3829; color: #fff; border: none; padding: 20px 40px;
		border-radius: 50px; font-size: 1.5em; font-weight: bold; cursor: pointer;
		transition: 0.3s; width: 100%; display: flex; align-items: center;
		justify-content: center; gap: 15px;
	}
	.call-action-btn:hover { background: #d63022; transform: scale(1.02); }
	.call-action-btn:disabled { background: #444; cursor: not-allowed; }

	/* Ocultamos lo innecesario */
	.mytrips, .footer, .top-banner { display: none; }
</style>
</head>
<body>
	<div class="banner">
		<div class="container">
			<div class="logo">
				<h1><a href="index.html" style="color:#fff !important;">CLARO <span>ASSIST</span></a></h1>
			</div>
			<div class="clearfix"> </div>
		</div>
	</div>

	<div class="container">
		<div class="support-container">
			<h2>Soporte Técnico</h2>
			<p class="subtitle">Anexo Directo: 6100</p>

			<div class="status-panel">
				<div id="registration-status-icon"></div>
				<span id="registration-status-text">Verificando línea...</span>
			</div>

			<button id="make-call-btn" class="call-action-btn" onclick="handleCall()" disabled>
				<i class="fa fa-phone"></i> LLAMAR AHORA
			</button>

			<div id="call-controls-section">
				<div id="active-call-timer" style="font-size: 2em; margin: 20px 0; display:none;">00:00</div>
				<button id="hangup-btn" class="call-action-btn" style="background:#444; display:none;" onclick="callingSDK.hangup()">
					<i class="fa fa-phone-slash"></i> FINALIZAR
				</button>
			</div>
		</div>
	</div>

	<script src="js/jquery-1.11.1.min.js"></script>
	<script src="js/bootstrap.js"></script>
	<script src="https://unpkg.com/webex/umd/webex.min.js"></script>
	<script src='https://unpkg.com/webex@3.5.0-next.25/umd/calling.min.js'></script>
	
	<script type="text/javascript" src="./js/timer.js"></script>
	<script type="text/javascript" src="./sdk/calling-sdk.js"></script>
	<script type="text/javascript" src="./js/claro-logic.js"></script>

	<script>
		/**
		 * Sincronización visual local:
		 * Monitoreamos el SDK cada segundo para actualizar la interfaz de Claro
		 */
		const checkStatus = setInterval(() => {
			if (typeof callingSDK !== 'undefined' && callingSDK.isRegistered) {
				const icon = document.getElementById('registration-status-icon');
				const text = document.getElementById('registration-status-text');
				const btn = document.getElementById('make-call-btn');

				if (icon) icon.classList.add('online-status');
				if (text) text.innerText = "Línea Habilitada";
				if (btn) btn.disabled = false;
				
				clearInterval(checkStatus);
			}
		}, 1000);

		// Manejo básico de visibilidad de botones en llamada
		window.addEventListener('call:connected', () => {
			document.getElementById('make-call-btn').style.display = 'none';
			document.getElementById('hangup-btn').style.display = 'flex';
			document.getElementById('active-call-timer').style.display = 'block';
		});

		window.addEventListener('call:disconnected', () => {
			document.getElementById('make-call-btn').style.display = 'flex';
			document.getElementById('hangup-btn').style.display = 'none';
			document.getElementById('active-call-timer').style.display = 'none';
		});
	</script>
</body>	
</html>
